<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">

<title>Beton Metraj Pro</title>

<style>

body{
font-family:Segoe UI;
background:#eef1f5;
padding:30px;
}

.container{
background:white;
padding:25px;
max-width:1250px;
margin:auto;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:8px;
}

input,select{
padding:10px;
font-size:14px;
border:1px solid #e0e3ea;
border-radius:8px;
height:40px;
background:#f9fbff;
transition:all 0.2s ease;
}

input:focus,select:focus{
border-color:#2962ff;
outline:none;
background:white;
box-shadow:0 0 0 2px rgba(41,98,255,0.1);
}

button{
background:linear-gradient(135deg,#2962ff,#0039cb);
border:none;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:500;
transition:all 0.2s ease;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(41,98,255,0.3);
}

.card{
background:white;
border-radius:12px;
padding:16px;
margin-top:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
border:1px solid #f0f2f7;
transition:all 0.2s ease;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(0,0,0,0.1);
}

.top{
font-weight:600;
margin-bottom:5px;
}

.info{
color:#555;
font-size:14px;
}

.icons button{
background:#f1f3f7;
color:#333;
margin-right:5px;
border-radius:6px;
padding:6px 8px;
font-size:13px;
}

.icons button:hover{
background:#2962ff;
color:white;
}

.totalBox{
background:linear-gradient(135deg,#f7f9fc,#eef3ff);
padding:14px;
margin-top:15px;
border-radius:10px;
font-weight:500;
border:1px solid #e3e8f5;
}

#popupBg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

#popup{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
animation:fade .2s ease;
}

.popupHeader{
display:flex;
justify-content:space-between;
font-weight:600;
margin-bottom:10px;
}

.closeBtn{
cursor:pointer;
font-size:18px;
}

@keyframes fade{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

@media(max-width:600px){

body{
padding:10px;
}

.container{
padding:15px;
border-radius:12px;
}

/* grid tek sütun ama sıkışık */
.grid{
grid-template-columns:1fr 1fr;
gap:6px;
}

/* inputlar küçülür */
input,select{
height:36px;
font-size:16px;
padding:8px;
}

/* butonlar full olmasın */
button{
width:auto;
flex:1;
}

/* buton satırı */
.buttonRow{
display:flex;
gap:6px;
flex-wrap:wrap;
}

}

}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:22px;
font-weight:700;
}

.subtitle{
font-size:13px;
color:#777;
}

.badge{
background:#2962ff;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.topActions{
display:flex;
gap:8px;
}

.topActions button{
width:40px;
height:40px;
padding:0;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>
<div class="title">Beton Metraj Pro</div>
<div class="subtitle">Profesyonel Metraj Hesaplama</div>
</div>

<div class="topActions">

<button onclick="exportExcel()">📊</button>
<button onclick="exportPDF()">📄</button>
<button onclick="resetAll()" style="background:#e53935">🗑</button>

</div>

</div>

<div class="grid">

<input id=projectName placeholder="Proje">

<input id=betonName placeholder="Beton adı">

<select id=betonType onchange=showForm()>

<option value="">Tür</option>

<option value=tabliye>Tabliye</option>

<option value=temel>Temel</option>

<option value=perde>İstinat Perde</option>

<option value=binaTemel>Bina Temel</option>

</select>

<input id=betonSinif placeholder="Beton Cinsi (C30)">

</div>

<div id=formArea></div>

<button id=addBtn onclick=calculate()>
Beton Ekle
</button>

<button id=cancelBtn onclick=cancelEdit() style="display:none">
İptal
</button>






<h3>Betonlar</h3>

<div id=list></div>

<div id=totals></div>
<div id="popupBg" style="display:none">
<div id="popup">

<div class="popupHeader">
<span>Detay</span>
<span onclick="closePopup()" class="closeBtn">✖</span>
</div>

<div id="popupContent"></div>

</div>
</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("betonlar")) || []
let editIndex=-1
let currentData={}

function num(v){

if(!v) return 0

v=v.replace(",",".")
if(v.startsWith(".")) v="0"+v

return parseFloat(v)

}

function fix(v){

if(!v) return ""

v=v.replace(",",".")
if(v.startsWith(".")) v="0"+v

let n=parseFloat(v)

if(isNaN(n)) return ""

return n.toFixed(2).replace(".",",")

}

function text(v){

return v.toLowerCase()
.replace(/(^|\s)\S/g,l=>l.toUpperCase())

}

function clearForm(){

document
.querySelectorAll("#formArea input")
.forEach(i=>i.value="")

betonName.value=""
betonSinif.value=""

}

function showForm(){

let t=betonType.value

if(t=="temel"){

formArea.innerHTML=`

<input id=tg placeholder="Temel genişliği (m)">
<input id=tu placeholder="Temel uzunluğu (m)">
<input id=tm placeholder="veya direkt m²">
<input id=th placeholder="Temel yüksekliği (m)">

`

}

if(t=="perde"){

formArea.innerHTML=`

<input id=pu placeholder="Perde uzunluğu (m)">
<input id=ph placeholder="Perde yüksekliği (m)">
<input id=pk placeholder="Perde kalınlığı (m)">

`

}

if(t=="binaTemel"){

formArea.innerHTML=`

<input id=ba placeholder="Temel alanı (m²)">
<input id=aa placeholder="Ampatman alanı (m²)">
<input id=tk placeholder="Temel kalınlığı (m)">
<input id=ai placeholder="Asansör iç alan (m²)">

`

}

if(t=="tabliye"){

formArea.innerHTML=`

<input id=ta placeholder="Tabliye Alanı (m²)">
<input id=tas placeholder="Asansör Alanı (m²)">
<input id=tam placeholder="Merdiven Alanı (m²)">
<input id=td placeholder="Döşeme Kalınlığı (m)">
<input id=kh placeholder="Kat İç Temiz Yüksekliği">
<input id=kpa placeholder="Kolon+Perde Alanı (m²) (opsiyonel)">

<button onclick=createKolon()>
Kolon/Perde gir
</button>

<div id=kolonlar></div>

<input id=ke placeholder="Köpük En">
<input id=kb placeholder="Köpük Boy">
<input id=ky placeholder="Köpük Yükseklik">
<input id=mb placeholder="Merdiven Beton Alanı">

`

}

}

function createKolon(){

let ks=prompt("Kolon sayısı")
let ps=prompt("Perde sayısı")

currentData.ks=ks
currentData.ps=ps

let h=""

for(let i=1;i<=ks;i++){

h+=`
S${i}

<input class=ken placeholder="En">
<input class=kboy placeholder="Boy">
<br>
`

}

for(let i=1;i<=ps;i++){

h+=`
P${i}

<input class=ken>

<input class=kboy>
<br>
`

}

kolonlar.innerHTML=h

}

function calculate(){
let tg=document.getElementById("tg")
let tu=document.getElementById("tu")
let tm=document.getElementById("tm")
let th=document.getElementById("th")

let pu=document.getElementById("pu")
let ph=document.getElementById("ph")
let pk=document.getElementById("pk")

let ba=document.getElementById("ba")
let aa=document.getElementById("aa")
let tk=document.getElementById("tk")
let ai=document.getElementById("ai")

let ta=document.getElementById("ta")
let tas=document.getElementById("tas")
let tam=document.getElementById("tam")
let td=document.getElementById("td")
let kh=document.getElementById("kh")
let kpa=document.getElementById("kpa")
let ke=document.getElementById("ke")
let kb=document.getElementById("kb")
let ky=document.getElementById("ky")
let mb=document.getElementById("mb")

let type=betonType.value

let m3=0
let kopuk=0
let adet=0
let detay=""

if(type=="temel"){

if(num(tm?.value)>0)
m3=num(tm?.value)*num(th.value)

else
m3=num(tg.value)
*num(tu.value)
*num(th.value)

detay="Temel beton"

}

if(type=="perde"){

m3=num(pu.value)
*num(ph.value)
*num(pk.value)

detay="Perde beton"

}

if(type=="binaTemel"){

let net=
num(ba.value)
-num(aa.value)

m3=
(net*num(tk.value))
+
(num(aa.value)
*num(tk.value))
+
((num(aa.value)
-num(ai.value))
*1.6)

detay="Bina temel"

}

if(type=="tabliye"){

let net=
num(ta.value)
-num(tas.value)
-num(tam.value)

let kp=num(kpa.value)

if(kp==0){

let en=document.querySelectorAll(".ken")
let boy=document.querySelectorAll(".kboy")

kp=0

for(let i=0;i<en.length;i++){

kp+=
num(en[i].value)
*
num(boy[i].value)

}

}

let kolon=
kp*num(kh.value)

kopuk=
net*
num(ke.value)
*num(kb.value)
*num(ky.value)
*0.9

adet=Math.ceil(
kopuk/
(num(ke.value)
*num(kb.value)
*num(ky.value))
)

let tab=
(net*num(td.value))
-kopuk

let mer=
num(mb.value)*0.30

m3=
tab+
kolon+
mer

detay=`
Tabliye:${tab.toFixed(2)}

Kolon:${kolon.toFixed(2)}

Merdiven:${mer.toFixed(2)}

`

}

let obj={
data:{
tg:tg ? tg.value : "",
tu:tu?.value,
tm:tm?.value,
th:th?.value,

pu:pu?.value,
ph:ph?.value,
pk:pk?.value,

ba:ba?.value,
aa:aa?.value,
tk:tk?.value,
ai:ai?.value,

ta:ta?.value,
tas:tas?.value,
tam:tam?.value,
td:td?.value,
kh:kh?.value,
kpa:kpa?.value,
ke:ke?.value,
kb:kb?.value,
ky:ky?.value,
mb:mb?.value,

ens:[...document.querySelectorAll(".ken")].map(e=>e.value),
boys:[...document.querySelectorAll(".kboy")].map(e=>e.value)

},

proje:text(projectName.value),

isim:text(betonName.value),

sinif:betonSinif.value.toUpperCase(),

m3:m3,

kopuk:kopuk,

adet:adet,

detay:detay,

type:type

}

if(editIndex==-1)
items.push(obj)
else{

items[editIndex]=obj
editIndex=-1
addBtn.innerText="Beton Ekle"

}

clearForm()

draw()
localStorage.setItem("betonlar", JSON.stringify(items))

}

function draw(){

let h=""
let betonToplam={}
let kopukToplam={}

items.forEach((i,x)=>{
// köpük tipi oluştur
let ke = num(i.data.ke)
let kb = num(i.data.kb)
let ky = num(i.data.ky)

// boş veya hatalıysa geç
let tip = ""

if(ke > 0 && kb > 0 && ky > 0){

tip = 
Math.round(ke*100) + "x" +
Math.round(kb*100) + "x" +
Math.round(ky*100)

if(i.kopuk > 0){

if(!kopukToplam[tip]){
kopukToplam[tip]={m3:0,adet:0}
}

kopukToplam[tip].m3 += i.kopuk
kopukToplam[tip].adet += i.adet

}

}


if(!betonToplam[i.sinif])
betonToplam[i.sinif]=0

betonToplam[i.sinif]+=i.m3

h+=`

<div class=card>

<div class=top>

${i.proje}
/
${i.isim}

</div>

<div class=info>

${i.m3.toFixed(2)} m³
/
${i.sinif}

<br>

Köpük:
${i.kopuk.toFixed(2)} m³
(${i.adet})

</div>

<div class=icons>

<button onclick=moveUp(${x})>⬆️</button>
<button onclick=moveDown(${x})>⬇️</button>

<button onclick=detay(${x})>
🔍
</button>

<button onclick=edit(${x})>
✏️
</button>

<button onclick=sil(${x})>
🗑
</button>

</div>

</div>

`

})

list.innerHTML=h

let t=""

for(let k in betonToplam){

t+=`

<div class=totalBox>

Toplam ${k} :

${betonToplam[k].toFixed(2)} m³

</div>

`

}


for(let k in kopukToplam){

t+=`

<div class=totalBox>

Toplam ${k} :

${kopukToplam[k].m3.toFixed(2)} m³

(${kopukToplam[k].adet} adet)

</div>

`

}
totals.innerHTML=t

}

function detay(i){

let d=items[i]

let kopukTip=
fix(d.data.ke)+" x "+
fix(d.data.kb)+" x "+
fix(d.data.ky)

let baslik = `
<b style="font-size:16px">
${d.proje} / ${d.isim}
</b>
<hr><br>
`

let html= baslik + `

<div class="info">

<b>Tabliye Betonu:</b> ${d.detay.split("Kolon")[0].replace("Tabliye:","")} m³<br><br>

<b>Kolon-Perde Betonu:</b> ${d.detay.split("Kolon:")[1].split("Merdiven")[0]} m³<br><br>

<b>Merdiven Betonu:</b> ${d.detay.split("Merdiven:")[1]} m³<br><br>

<hr>

<b>Toplam Beton:</b> ${d.m3.toFixed(2)} m³<br><br>

<b>Toplam Köpük:</b> ${d.kopuk.toFixed(2)} m³ (${d.adet} adet)<br>

<b>Köpük Tipi:</b> ${kopukTip}

</div>
`

popupContent.innerHTML=html
popupBg.style.display="flex"

}

function sil(i){
localStorage.setItem("betonlar", JSON.stringify(items))

items.splice(i,1)

draw()

}

function edit(i){

editIndex=i

projectName.value=
items[i].proje

betonName.value=
items[i].isim

betonSinif.value=
items[i].sinif

betonType.value=
items[i].type

showForm()
let d=items[i].data
let tg=document.getElementById("tg")
let tu=document.getElementById("tu")
let tm=document.getElementById("tm")
let th=document.getElementById("th")

let pu=document.getElementById("pu")
let ph=document.getElementById("ph")
let pk=document.getElementById("pk")

let ba=document.getElementById("ba")
let aa=document.getElementById("aa")
let tk=document.getElementById("tk")
let ai=document.getElementById("ai")

let ta=document.getElementById("ta")
let tas=document.getElementById("tas")
let tam=document.getElementById("tam")
let td=document.getElementById("td")
let kh=document.getElementById("kh")
let kpa=document.getElementById("kpa")
let ke=document.getElementById("ke")
let kb=document.getElementById("kb")
let ky=document.getElementById("ky")
let mb=document.getElementById("mb")

if(d){

if(tg) tg.value=fix(d.tg)
if(tu) tu.value=fix(d.tu)
if(tm) tm.value=fix(d.tm)
if(th) th.value=fix(d.th)

if(pu) pu.value=fix(d.pu)
if(ph) ph.value=fix(d.ph)
if(pk) pk.value=fix(d.pk)

if(ba) ba.value=fix(d.ba)
if(aa) aa.value=fix(d.aa)
if(tk) tk.value=fix(d.tk)
if(ai) ai.value=fix(d.ai)

if(ta) ta.value=fix(d.ta)
if(tas) tas.value=fix(d.tas)
if(tam) tam.value=fix(d.tam)
if(td) td.value=fix(d.td)
if(kh) kh.value=fix(d.kh)
if(kpa) kpa.value=fix(d.kpa)
if(ke) ke.value=fix(d.ke)
if(kb) kb.value=fix(d.kb)
if(ky) ky.value=fix(d.ky)
if(mb) mb.value=fix(d.mb)

if(d.ens && d.ens.length){

let h=""

for(let j=0;j<d.ens.length;j++){

h+=`
<input class=ken value="${fix(d.ens[j])}" placeholder="En">
<input class=kboy value="${fix(d.boys[j])}" placeholder="Boy">
<br>
`

}

kolonlar.innerHTML=h

}

}

addBtn.innerText=
"Beton Güncelle"
cancelBtn.style.display="inline"

}

function cancelEdit(){

editIndex=-1

addBtn.innerText="Beton Ekle"
cancelBtn.style.display="none"


clearForm()

}

function closePopup(){
popupBg.style.display="none"
}

popupBg.addEventListener("click",e=>{
if(e.target.id=="popupBg"){
closePopup()
}
})

function resetAll(){

if(confirm("Tüm verileri sıfırlamak istiyor musunuz?")){

items=[]
localStorage.removeItem("betonlar")
draw()

clearForm()

}

}

function moveUp(i){

if(i===0) return

let temp=items[i]
items[i]=items[i-1]
items[i-1]=temp

draw()

}

function moveDown(i){

if(i===items.length-1) return

let temp=items[i]
items[i]=items[i+1]
items[i+1]=temp

draw()

}

function exportExcel(){

let csv = "\uFEFF" // UTF-8 BOM EKLİYORUZ

csv += "Proje;Beton Adı;Beton Sınıfı;m3;Köpük m3;Adet\n"

items.forEach(i=>{

let alan = ""

if(i.type=="tabliye"){
alan = num(i.data.ta)
}

if(i.type=="binaTemel"){
alan = num(i.data.ba)
}

let alanText = ""

if(alan>0){
alanText = " (" + alan.toFixed(2).replace(".",",") + " m²)"
}

csv +=
`${i.proje};${i.isim};${i.sinif};${i.m3.toFixed(2)};${i.kopuk.toFixed(2)};${i.adet}\n`

})

let blob = new Blob([csv], {type:"text/csv;charset=utf-8;"})

let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "beton_metraj.csv"
a.click()

}

function exportPDF(){

let betonToplam={}
let kopukToplam={}

let w = window.open("")

let html = `
<h2>Uygulama Beton Metraj</h2>
<hr>
`

items.forEach(i=>{

let alan = ""

if(i.type=="tabliye"){
alan = num(i.data.ta)
}

if(i.type=="binaTemel"){
alan = num(i.data.ba)
}

let alanText = ""

if(alan>0){
alanText = " (" + alan.toFixed(2).replace(".",",") + " m²)"
}

// beton toplam
if(!betonToplam[i.sinif]){
betonToplam[i.sinif]=0
}
betonToplam[i.sinif]+=i.m3

// köpük toplam
let ke = num(i.data.ke)
let kb = num(i.data.kb)
let ky = num(i.data.ky)

if(ke>0 && kb>0 && ky>0){

let tip = 
Math.round(ke*100)+"x"+
Math.round(kb*100)+"x"+
Math.round(ky*100)

if(i.kopuk>0){

if(!kopukToplam[tip]){
kopukToplam[tip]={m3:0,adet:0}
}

kopukToplam[tip].m3+=i.kopuk
kopukToplam[tip].adet+=i.adet

}

}

let tab="",kolon="",mer=""

if(i.detay.includes("Tabliye")){

tab = i.detay.split("Kolon")[0].replace("Tabliye:","")
kolon = i.detay.split("Kolon:")[1].split("Merdiven")[0]
mer = i.detay.split("Merdiven:")[1]

}


let tip=""

if(ke>0 && kb>0 && ky>0){
tip = Math.round(ke*100)+"x"+Math.round(kb*100)+"x"+Math.round(ky*100)
}

html += `
<p>
<b>${i.proje} / ${i.isim}${alanText}</b><br>

${i.m3.toFixed(2)} m³ / ${i.sinif}

<br><br>

Tabliye Betonu: ${tab} m³<br>
Kolon-Perde Betonu: ${kolon} m³<br>
Merdiven Betonu: ${mer} m³

<br><br>

Köpük: ${i.kopuk.toFixed(2)} m³ (${i.adet} adet) ${tip}

</p>
<hr>
`

})


html += `<h2 style="margin-top:30px">Genel Toplamlar</h2><hr>`
// beton toplamları
for(let k in betonToplam){

html += `
<p><b>Toplam ${k}:</b> ${betonToplam[k].toFixed(2)} m³</p>
`

}

// köpük toplamları
for(let k in kopukToplam){

html += `
<p><b>Toplam ${k}:</b> ${kopukToplam[k].m3.toFixed(2)} m³ (${kopukToplam[k].adet} adet)</p>
`

}
w.document.write(html)
w.print()

}

draw()

</script>

</body>
</html>
